<html>
<head>

  <meta charset="UTF-8">

  <meta name="keywords" content="Flutter Developer Kerala, mobile app developer, Supabase Flutter, Firebase Flutter, Mohammed Dilshad" />

  <!-- Open Graph / Facebook -->
  <meta property="og:title" content="Mohammed Dilshad P | Flutter Developer" />
  <meta property="og:description" content="Flutter Developer crafting production-ready apps — Alizo, NaDodi &amp; Adam Travels." />

  <meta property="og:type" content="website" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Mohammed Dilshad P | Flutter Developer" />
  <meta name="twitter:description" content="Flutter Developer crafting production-ready apps — Alizo, NaDodi &amp; Adam Travels." />
  <meta name="twitter:image" content="https://m-dilshad-p.vercel.app/icons/preview.png" />

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Mohammed Dilshad P">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg"/>
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png"/>

  <link rel="manifest" href="manifest.json">

  <style>
    body {
      background-color: #04040A;
      margin: 0;
    }

    .loading-screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #04040A;
      font-family: 'Courier New', monospace;
      z-index: 9999;
    }

    .loading-logo {
      font-size: 48px;
      font-weight: 700;
      background: linear-gradient(90deg, #00F5FF, #7C3AED);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: mdpulse 1.5s ease-in-out infinite;
    }

    .loading-text {
      color: #505070;
      font-size: 12px;
      margin-top: 16px;
      letter-spacing: 3px;
    }

    @keyframes mdpulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
</head>
<body>
  <div class="loading-screen" id="loading">
    <div class="loading-logo">MD.</div>
    <div class="loading-text">Mohammed Dilshad p</div>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', () => {
      const loading = document.getElementById('loading');
      if (loading) {
        loading.style.opacity = '0';
        loading.style.transition = 'opacity 0.5s ease';
        setTimeout(() => { loading.style.display = 'none'; }, 500);
      }
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
